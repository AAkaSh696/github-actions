name: portfolio

on:
    push:
        branches: [main]

permissions:
    pages: write
    id-token: write 

jobs:
    deploy:
        runs-on: ubuntu-latest

        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            # get access to your portfolio code via pre-built steps
            - name: Checkout code
              uses: actions/checkout@v4
            
            # Set Github pages
            - name: Configure github pages
              uses: actions/configure-pages@v4
            
            # To make website static to improve speed and performance
            - name: Static code artifacts
              uses: actions/upload-pages-artifact@v4
              with:
                path: "."

            # Deploy to github pages
            - name: Deploy to github pages
              uses: actions/deploy-pages@v4

           
    
