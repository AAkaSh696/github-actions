# This is workflow name
name: Hello

on:
  workflow_dispatch: 
    inputs:
      environment:
        description: This is the environment calue where workflow run
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging 

#These are jobs inside the workflow 
jobs:
  greet:
    runs-on: ubuntu-latest 
    steps:
      - name: Say Hello
        run: echo "Hello"
      - name: Say User
        run: echo "$USER"

  details:
    runs-on: ubuntu-latest
    steps:
      - name: versions of docker and python
        run: docker --version && python --version
